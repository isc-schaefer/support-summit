<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Summit Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDq5HSFeS62FpKswWu2L6R9Ie7M22_rrwU",
    authDomain: "support-summit-agenda.firebaseapp.com",
    databaseURL: "https://support-summit-agenda-default-rtdb.firebaseio.com",
    projectId: "support-summit-agenda",
    storageBucket: "support-summit-agenda.firebasestorage.app",
    messagingSenderId: "78793993572",
    appId: "1:78793993572:web:74e9ad579c99cc7b9c9e71"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const DAYS = ['Monday','Tuesday','Wednesday','Thursday'];
  const DAYTIME = ['8:00 AM','8:30 AM','9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM','4:00 PM','4:30 PM','5:00 PM'];
  const EVENING = ['5:30 PM','6:00 PM','6:30 PM','7:00 PM','7:30 PM','8:00 PM','8:30 PM','9:00 PM'];
  const HAS_EVENING = new Set(['Tuesday']);

  // Slot modes: 'single' | 'two' | 'three'
  // Rooms: roomE = East Tower, roomW = West Tower (combined), roomW1 = West Tower 1, roomW2 = West Tower 2

  const ROOM_LABELS = {
    roomE: 'East Tower',
    roomW: 'West Tower',
    roomW1: 'West Tower 1',
    roomW2: 'West Tower 2'
  };

  const ROOM_COLORS = {
    roomE: 'roomE', roomW: 'roomW', roomW1: 'roomW1', roomW2: 'roomW2'
  };

  function allSlots(day) { return HAS_EVENING.has(day) ? [...DAYTIME, ...EVENING] : DAYTIME; }

  let slotMode = {};   // slotMode[day][slot] = 'single' | 'two' | 'three'
  let sessions = {};   // sessions[key] = {type, title, speaker, notes}
  let currentDay = 0;
  let editKey = null;
  let initialized = false;
  let splitMenuSlot = null;
  let splitMenuDay = null;

  function getMode(day, slot) {
    return (slotMode[day] && slotMode[day][slot]) || 'single';
  }

  function buildDefaultSlotMode() {
    const sm = {};
    DAYS.forEach(day => {
      sm[day] = {};
      allSlots(day).forEach(slot => { sm[day][slot] = 'single'; });
    });
    return sm;
  }

  onValue(ref(db, 'agenda'), (snapshot) => {
    const data = snapshot.val();
    if (data && data.slotMode && data.sessions) {
      slotMode = data.slotMode;
      sessions = data.sessions;
    } else if (!initialized) {
      slotMode = buildDefaultSlotMode();
      sessions = {};
      set(ref(db, 'agenda'), { slotMode, sessions });
    }
    initialized = true;
    setStatus('live');
    renderTabs();
    renderGrid();
  });

  function setStatus(state) {
    const el = document.getElementById('statusDot');
    if (!el) return;
    if (state === 'live') { el.style.background = '#22c55e'; el.title = 'Connected'; }
    else if (state === 'saving') { el.style.background = '#f59e0b'; el.title = 'Saving...'; }
    else { el.style.background = '#ef4444'; el.title = 'Disconnected'; }
  }

  function saveToFirebase(updates) {
    setStatus('saving');
    update(ref(db, 'agenda'), updates).then(() => setStatus('live'));
  }

  window.switchDay = (i) => { currentDay = i; renderTabs(); renderGrid(); closeSplitMenu(); };

  function renderTabs() {
    document.getElementById('dayTabs').innerHTML = DAYS.map((d,i) =>
      `<button class="day-tab${i===currentDay?' active':''}" onclick="switchDay(${i})">${d}</button>`
    ).join('');
  }

  function colsForMode(mode) {
    if (mode === 'two') return '72px 1fr 1fr 40px';
    if (mode === 'three') return '72px 1fr 1fr 1fr 40px';
    return '72px 1fr 40px';
  }

  function headCellsForMode(mode) {
    if (mode === 'two') return `<div class="ghc">East Tower</div><div class="ghc">West Tower</div>`;
    if (mode === 'three') return `<div class="ghc">East Tower</div><div class="ghc">West Tower 1</div><div class="ghc">West Tower 2</div>`;
    return `<div class="ghc" style="border-right:none">General Session</div>`;
  }

  // Determine the dominant mode for the current day (for header)
  function dominantMode(day) {
    const slots = allSlots(day);
    let maxCols = 1;
    slots.forEach(slot => {
      const m = getMode(day, slot);
      if (m === 'three') maxCols = Math.max(maxCols, 3);
      else if (m === 'two') maxCols = Math.max(maxCols, 2);
    });
    return maxCols === 3 ? 'three' : maxCols === 2 ? 'two' : 'single';
  }

  function renderGrid() {
    const day = DAYS[currentDay];
    const slots = allSlots(day);
    const dom = dominantMode(day);

    // Header always shows max columns for the day
    const headEl = document.getElementById('gridHead');
    headEl.style.gridTemplateColumns = colsForMode(dom);
    headEl.innerHTML = `<div class="ghc">Time</div>${headCellsForMode(dom)}<div class="ghc"></div>`;

    let html = '';
    let passedEvening = false;

    slots.forEach(slot => {
      if (EVENING.includes(slot) && !passedEvening) {
        passedEvening = true;
        html += `<div class="time-row" style="grid-template-columns:${colsForMode(dom)};min-height:auto;border-bottom:1px solid var(--border);">
          <div class="evening-divider"><span>Evening</span><div class="evening-divider-line"></div></div>
        </div>`;
      }

      const mode = getMode(day, slot);
      const gridCols = colsForMode(mode);
      // For rows with fewer cols than header, span appropriately
      const isNarrower = mode !== dom;

      html += `<div class="time-row" style="grid-template-columns:${gridCols}">`;
      html += `<div class="time-cell">${slot}</div>`;

      if (mode === 'single') {
        const k = `${day}||${slot}||single`;
        const s = sessions[k] || {type:'empty',title:'',speaker:'',notes:''};
        html += `<div class="session-cell" style="grid-column:2/${dom==='three'?5:dom==='two'?4:3}">
          <div class="session-inner type-${s.type||'empty'}" onclick="openModal('${k}')">
            <div class="s-title">${s.title||'+ add session'}</div>
            ${s.speaker?`<div class="s-speaker">${s.speaker}</div>`:''}
            <span class="edit-chip">edit</span>
          </div>
        </div>`;
        html += `<div class="action-col">
          <button class="icon-btn split-btn" title="Split into rooms" onclick="showSplitMenu('${day}','${slot}',this)">⊞</button>
        </div>`;
      } else if (mode === 'two') {
        ['roomE','roomW'].forEach(r => {
          const k = `${day}||${slot}||${r}`;
          const s = sessions[k] || {type:r,title:'',speaker:'',notes:''};
          html += `<div class="session-cell">
            <div class="session-inner type-${s.type||r}" onclick="openModal('${k}')">
              <div class="s-title">${s.title||'+ add'}</div>
              ${s.speaker?`<div class="s-speaker">${s.speaker}</div>`:''}
              <span class="edit-chip">edit</span>
            </div>
          </div>`;
        });
        html += `<div class="action-col" style="gap:3px">
          <button class="icon-btn split3-btn" title="Split West Tower" onclick="setMode('${day}','${slot}','three')" style="font-size:10px;width:28px;height:18px">W⊞</button>
          <button class="icon-btn merge-btn" title="Merge to single" onclick="setMode('${day}','${slot}','single')">⊟</button>
        </div>`;
      } else {
        ['roomE','roomW1','roomW2'].forEach(r => {
          const k = `${day}||${slot}||${r}`;
          const s = sessions[k] || {type:r,title:'',speaker:'',notes:''};
          html += `<div class="session-cell">
            <div class="session-inner type-${s.type||r}" onclick="openModal('${k}')">
              <div class="s-title">${s.title||'+ add'}</div>
              ${s.speaker?`<div class="s-speaker">${s.speaker}</div>`:''}
              <span class="edit-chip">edit</span>
            </div>
          </div>`;
        });
        html += `<div class="action-col" style="gap:3px">
          <button class="icon-btn merge2-btn" title="Merge West Tower" onclick="setMode('${day}','${slot}','two')" style="font-size:10px;width:28px;height:18px">W⊟</button>
          <button class="icon-btn merge-btn" title="Merge all to single" onclick="setMode('${day}','${slot}','single')">⊟</button>
        </div>`;
      }

      html += `</div>`;
    });

    document.getElementById('gridBody').innerHTML = html;
  }

  // Split menu popup for choosing 2 or 3 rooms
  window.showSplitMenu = (day, slot, btn) => {
    closeSplitMenu();
    splitMenuDay = day; splitMenuSlot = slot;
    window._smDay = day; window._smSlot = slot;
    const menu = document.getElementById('splitMenu');
    const rect = btn.getBoundingClientRect();
    menu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    menu.style.left = (rect.left + window.scrollX - 80) + 'px';
    menu.style.display = 'block';
    document.getElementById('smSlotLabel').textContent = `${day} · ${slot}`;
  };

  window.closeSplitMenu = () => {
    document.getElementById('splitMenu').style.display = 'none';
    splitMenuDay = null; splitMenuSlot = null;
  };

  window.setMode = (day, slot, mode) => {
    closeSplitMenu();
    if (!slotMode[day]) slotMode[day] = {};
    const prevMode = slotMode[day][slot] || 'single';
    slotMode[day][slot] = mode;
    const updates = { [`slotMode/${day}/${slot}`]: mode };

    // Seed sessions for new rooms if needed
    const roomsForMode = { single:['single'], two:['roomE','roomW'], three:['roomE','roomW1','roomW2'] };
    const newRooms = roomsForMode[mode] || ['single'];
    newRooms.forEach(r => {
      const k = `${day}||${slot}||${r}`;
      if (!sessions[k]) {
        // Try to carry content from previous mode
        let carried = null;
        if (prevMode === 'single') carried = sessions[`${day}||${slot}||single`];
        else if (prevMode === 'two' && (r === 'roomW1' || r === 'roomW')) carried = sessions[`${day}||${slot}||roomW`];
        else if (prevMode === 'three' && r === 'roomW') carried = sessions[`${day}||${slot}||roomW1`];
        sessions[k] = carried ? {...carried, type: r==='single'?carried.type:r} : {type:r==='single'?'empty':r, title:'', speaker:'', notes:''};
        updates[`sessions/${k}`] = sessions[k];
      }
    });

    saveToFirebase(updates);
    renderGrid();
  };

  // Click outside to close split menu
  document.addEventListener('click', e => {
    if (splitMenuDay && !e.target.closest('#splitMenu') && !e.target.classList.contains('split-btn')) closeSplitMenu();
  });

  window.openModal = (k) => {
    editKey = k;
    const s = sessions[k] || {};
    document.getElementById('mTitle').value = s.title||'';
    document.getElementById('mSpeaker').value = s.speaker||'';
    document.getElementById('mNotes').value = s.notes||'';
    const allTypes = [
      {v:'single',l:'General session'},{v:'roomE',l:'East Tower'},
      {v:'roomW',l:'West Tower'},{v:'roomW1',l:'West Tower 1'},{v:'roomW2',l:'West Tower 2'},
      {v:'social',l:'Social event'},{v:'break',l:'Break / Meal'},{v:'empty',l:'Empty slot'}
    ];
    const cur = s.type || k.split('||')[2] || 'empty';
    document.getElementById('mType').innerHTML = allTypes.map(o=>`<option value="${o.v}"${o.v===cur?' selected':''}>${o.l}</option>`).join('');
    document.getElementById('overlay').classList.add('open');
    setTimeout(()=>document.getElementById('mTitle').focus(),80);
  };

  window.closeModal = () => { document.getElementById('overlay').classList.remove('open'); editKey=null; };

  window.saveModal = () => {
    if (!editKey) return;
    const updated = {
      type: document.getElementById('mType').value,
      title: document.getElementById('mTitle').value.trim(),
      speaker: document.getElementById('mSpeaker').value.trim(),
      notes: document.getElementById('mNotes').value.trim()
    };
    sessions[editKey] = updated;
    saveToFirebase({[`sessions/${editKey}`]: updated});
    closeModal();
    renderGrid();
  };

  window.exportBackup = () => {
    const blob = new Blob([JSON.stringify({slotMode, sessions}, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `support-summit-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  document.getElementById('overlay').addEventListener('click', e => { if(e.target===document.getElementById('overlay')) closeModal(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape'){closeModal();closeSplitMenu();} if(e.metaKey&&e.key==='Enter') saveModal(); });

  renderTabs();
</script>
<style>
  :root {
    --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F0EFE9;
    --border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);
    --text:#1A1916;--text-muted:#6B6A65;--text-faint:#A09F9A;
    --single:#1D5FA8;--single-bg:#E8F1FB;--single-border:#A8C8EE;
    --roomE:#1A6B47;--roomE-bg:#E4F3EC;--roomE-border:#7DCAA5;
    --roomW:#6B3FA8;--roomW-bg:#F0EBFB;--roomW-border:#C4A8EE;
    --roomW1:#A85A1A;--roomW1-bg:#FBF0E4;--roomW1-border:#EEC07A;
    --roomW2:#0E6E8C;--roomW2-bg:#E0F4FA;--roomW2-border:#7DCCE8;
    --social:#A8326B;--social-bg:#FBE8F1;--social-border:#EEA8C8;
    --break-bg:#F0EFE9;--break-border:rgba(0,0,0,0.1);
    --radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .logo-mark{width:28px;height:28px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center;}
  .logo-mark svg{width:16px;height:16px;fill:var(--bg);}
  .header-title{font-size:15px;font-weight:600;letter-spacing:-0.02em;}
  .header-sub{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;}
  .header-actions{display:flex;align-items:center;gap:10px;}
  .status-dot-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);}
  #statusDot{width:8px;height:8px;border-radius:50%;background:#94a3b8;transition:background 0.3s;}
  .btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);transition:background 0.12s;}
  .btn:hover{background:var(--surface2);}
  .btn-dark{background:var(--text);color:var(--bg);border-color:var(--text);}
  .btn-dark:hover{background:#2e2d29;}
  .main{padding:24px 32px 48px;max-width:1200px;margin:0 auto;}
  .day-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:4px;width:fit-content;}
  .day-tab{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:6px 18px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all 0.15s;}
  .day-tab:hover{color:var(--text);background:var(--surface2);}
  .day-tab.active{background:var(--text);color:var(--bg);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);}
  .legend-pip{width:8px;height:8px;border-radius:2px;}
  .legend-note{font-size:11px;color:var(--text-faint);}
  .grid-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  .grid-head{display:grid;gap:0;border-bottom:1px solid var(--border);background:var(--surface2);}
  .ghc{padding:10px 12px;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);border-right:1px solid var(--border);}
  .ghc:last-child{border-right:none;}
  .grid-body{display:flex;flex-direction:column;}
  .time-row{display:grid;gap:0;border-bottom:1px solid var(--border);min-height:44px;}
  .time-row:last-child{border-bottom:none;}
  .time-cell{padding:10px 10px 6px 12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-faint);border-right:1px solid var(--border);background:var(--surface2);}
  .session-cell{border-right:1px solid var(--border);padding:4px;}
  .session-cell:last-child{border-right:none;}
  .action-col{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:3px 2px;background:var(--surface2);border-left:1px solid var(--border);}
  .session-inner{width:100%;height:100%;border-radius:6px;padding:7px 10px;cursor:pointer;transition:filter 0.12s;min-height:34px;display:flex;flex-direction:column;justify-content:center;position:relative;}
  .session-inner:hover{filter:brightness(0.96);}
  .session-inner.type-single,.session-inner.type-general{background:var(--single-bg);border:1px solid var(--single-border);}
  .session-inner.type-roomE{background:var(--roomE-bg);border:1px solid var(--roomE-border);}
  .session-inner.type-roomW{background:var(--roomW-bg);border:1px solid var(--roomW-border);}
  .session-inner.type-roomW1{background:var(--roomW1-bg);border:1px solid var(--roomW1-border);}
  .session-inner.type-roomW2{background:var(--roomW2-bg);border:1px solid var(--roomW2-border);}
  .session-inner.type-social{background:var(--social-bg);border:1px solid var(--social-border);}
  .session-inner.type-break{background:var(--break-bg);border:1px dashed var(--break-border);}
  .session-inner.type-empty{background:transparent;border:1px dashed var(--border);opacity:0.5;}
  .session-inner.type-empty:hover{opacity:1;}
  .s-title{font-size:12px;font-weight:500;line-height:1.3;}
  .type-single .s-title,.type-general .s-title{color:var(--single);}
  .type-roomE .s-title{color:var(--roomE);}
  .type-roomW .s-title{color:var(--roomW);}
  .type-roomW1 .s-title{color:var(--roomW1);}
  .type-roomW2 .s-title{color:var(--roomW2);}
  .type-social .s-title{color:var(--social);}
  .type-break .s-title{color:var(--text-muted);}
  .type-empty .s-title{color:var(--text-faint);font-style:italic;}
  .s-speaker{font-size:11px;margin-top:2px;opacity:0.75;}
  .type-single .s-speaker,.type-general .s-speaker{color:var(--single);}
  .type-roomE .s-speaker{color:var(--roomE);}
  .type-roomW .s-speaker{color:var(--roomW);}
  .type-roomW1 .s-speaker{color:var(--roomW1);}
  .type-roomW2 .s-speaker{color:var(--roomW2);}
  .type-social .s-speaker{color:var(--social);}
  .edit-chip{position:absolute;top:4px;right:5px;font-size:10px;background:rgba(255,255,255,0.7);border:1px solid rgba(0,0,0,0.08);border-radius:4px;padding:1px 5px;color:var(--text-muted);opacity:0;transition:opacity 0.12s;pointer-events:none;}
  .session-inner:hover .edit-chip{opacity:1;}
  .icon-btn{border-radius:5px;border:1px solid var(--border-strong);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.1s;line-height:1;width:28px;height:22px;}
  .split-btn{color:#6B3FA8;border-color:#C4A8EE;}
  .split-btn:hover{background:#F0EBFB;}
  .split3-btn{color:#A85A1A;border-color:#EEC07A;font-size:10px!important;}
  .split3-btn:hover{background:#FBF0E4;}
  .merge-btn{color:#1A6B47;border-color:#7DCAA5;}
  .merge-btn:hover{background:#E4F3EC;}
  .merge2-btn{color:#0E6E8C;border-color:#7DCCE8;font-size:10px!important;}
  .merge2-btn:hover{background:#E0F4FA;}
  /* Split menu popup */
  #splitMenu{position:absolute;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius);padding:6px;z-index:100;display:none;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,0.12);}
  .sm-label{font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-faint);padding:4px 8px 6px;}
  .sm-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);text-align:left;}
  .sm-btn:hover{background:var(--surface2);}
  .sm-pip{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .evening-divider{grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:8px 12px 4px;background:var(--surface);}
  .evening-divider span{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--social);white-space:nowrap;}
  .evening-divider-line{flex:1;height:1px;background:var(--social-border);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.15s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-lg);padding:24px;width:400px;max-width:95vw;transform:translateY(8px);transition:transform 0.15s;}
  .overlay.open .modal{transform:translateY(0);}
  .modal-title{font-size:16px;font-weight:600;letter-spacing:-0.02em;margin-bottom:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 11px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color 0.12s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(0,0,0,0.3);}
  .field textarea{resize:vertical;min-height:64px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
  .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-muted);font-size:14px;gap:10px;}
  .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text-muted);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media print{
    header{position:static;}
    .header-actions,.day-tabs,.legend,.action-col,.icon-btn,#splitMenu{display:none!important;}
    .grid-wrap{border:1px solid #ccc;}
    .main{padding:0;max-width:100%;}
    .overlay{display:none!important;}
  }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
    </div>
    <div>
      <div class="header-title">Support Summit Agenda</div>
      <div class="header-sub">~100 attendees &middot; Mon–Thu</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="status-dot-wrap"><div id="statusDot"></div><span>Live sync</span></div>
    <button class="btn" onclick="exportBackup()">Backup JSON</button>
    <button class="btn btn-dark" onclick="window.print()">Print / PDF</button>
  </div>
</header>

<div class="main">
  <div class="day-tabs" id="dayTabs"><div class="loading"><div class="spinner"></div> Connecting...</div></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-pip" style="background:var(--roomE-border)"></div>East Tower</div>
    <div class="legend-item"><div class="legend-pip" style="background:var(--roomW-border)"></div>West Tower</div>
    <div class="legend-item"><div class="legend-pip" style="background:var(--roomW1-border)"></div>West Tower 1</div>
    <div class="legend-item"><div class="legend-pip" style="background:var(--roomW2-border)"></div>West Tower 2</div>
    <div class="legend-item"><div class="legend-pip" style="background:var(--social-border)"></div>Social</div>
    <div class="legend-item"><div class="legend-pip" style="background:#ccc;border:1px dashed #aaa;"></div>Break</div>
    <span class="legend-note">⊞ split &nbsp;·&nbsp; W⊞ split West Tower &nbsp;·&nbsp; ⊟ merge &nbsp;·&nbsp; W⊟ merge West Tower</span>
  </div>
  <div class="grid-wrap">
    <div class="grid-head" id="gridHead" style="grid-template-columns:72px 1fr 40px">
      <div class="ghc">Time</div><div class="ghc">General Session</div><div class="ghc"></div>
    </div>
    <div class="grid-body" id="gridBody"><div class="loading"><div class="spinner"></div> Loading agenda...</div></div>
  </div>
</div>

<!-- Split menu popup -->
<div id="splitMenu">
  <div class="sm-label" id="smSlotLabel"></div>
  <button class="sm-btn" onclick="setMode(window._smDay, window._smSlot, 'two')">
    <div class="sm-pip" style="background:var(--roomE-border)"></div>
    2 rooms — East + West Tower
  </button>
  <button class="sm-btn" onclick="setMode(window._smDay, window._smSlot, 'three')">
    <div class="sm-pip" style="background:var(--roomW1-border)"></div>
    3 rooms — East + West 1 + West 2
  </button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Edit session</div>
    <div class="field"><label>Title</label><input type="text" id="mTitle" placeholder="Session title"/></div>
    <div class="field"><label>Speaker / facilitator</label><input type="text" id="mSpeaker" placeholder="Name or TBD"/></div>
    <div class="field"><label>Session type</label><select id="mType"></select></div>
    <div class="field"><label>Notes</label><textarea id="mNotes" placeholder="Room, location, details..."></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-dark" onclick="saveModal()">Save changes</button>
    </div>
  </div>
</div>
</body>
</html>
