<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Summit 2026 Agenda — InterSystems</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#2D2B8F;--navy-dark:#1E1C6E;--navy-light:#3D3BA0;
    --teal:#3BBFAD;--teal-dark:#2A9D8F;
    --white:#FFFFFF;--offwhite:#F4F5F7;--gray:#E8E9EE;
    --text:#1A1A2E;--text-muted:#5A5B7A;--text-light:#8889A8;
    --border:rgba(45,43,143,0.12);--radius:4px;--radius-lg:8px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Inter',sans-serif;background:var(--offwhite);color:var(--text);font-size:15px;line-height:1.6;}

  /* LOGO BAR */
  .logo-bar{background:var(--white);padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;}

  /* HERO */
  .hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 50%,#3D3BA0 100%);padding:64px 40px 56px;text-align:center;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 120%,rgba(59,191,173,0.18) 0%,transparent 70%);pointer-events:none;}
  .hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal);margin-bottom:16px;}
  .hero-title{font-family:'Barlow',sans-serif;font-size:clamp(42px,6vw,72px);font-weight:800;line-height:1.0;color:var(--white);letter-spacing:-0.01em;margin-bottom:16px;}
  .hero-tagline{font-family:'Barlow',sans-serif;font-size:clamp(18px,2.5vw,26px);font-weight:400;font-style:italic;color:var(--teal);margin-bottom:28px;}
  .hero-dates{display:inline-flex;gap:16px;flex-wrap:wrap;justify-content:center;}
  .hero-date-pill{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:100px;padding:8px 20px;font-size:14px;font-weight:500;color:var(--white);letter-spacing:0.02em;}
  .hero-date-pill span{color:var(--teal);font-weight:600;}

  /* STICKY NAV */
  .sticky-nav{background:var(--navy);position:sticky;top:0;z-index:100;border-bottom:3px solid var(--teal);}
  .sticky-nav ul{list-style:none;display:flex;align-items:center;max-width:1100px;margin:0 auto;padding:0 24px;overflow-x:auto;scrollbar-width:none;}
  .sticky-nav ul::-webkit-scrollbar{display:none;}
  .sticky-nav li a{display:block;padding:16px 22px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.75);text-decoration:none;border-bottom:3px solid transparent;margin-bottom:-3px;transition:color 0.15s,border-color 0.15s;white-space:nowrap;}
  .sticky-nav li a:hover,.sticky-nav li a.active{color:var(--white);border-bottom-color:var(--teal);}

  /* SECTIONS */
  .section{padding:56px 0;}
  .section-alt{background:var(--white);}
  .section-inner{max-width:1100px;margin:0 auto;padding:0 40px;}
  .section-title{font-family:'Barlow',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);margin-bottom:28px;padding-bottom:12px;border-bottom:3px solid var(--teal);display:inline-block;}

  /* WEEK SELECTOR */
  .week-selector{display:flex;gap:0;margin-bottom:28px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;width:fit-content;background:var(--white);}
  .week-btn{font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:10px 24px;border:none;cursor:pointer;background:transparent;color:var(--text-muted);transition:all 0.15s;border-right:1px solid var(--border);}
  .week-btn:last-child{border-right:none;}
  .week-btn.active{background:var(--navy);color:var(--white);}
  .week-btn:hover:not(.active){background:var(--gray);}

  /* AGENDA */
  .agenda-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  .day-tabs-row{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--offwhite);overflow-x:auto;scrollbar-width:none;}
  .day-tabs-row::-webkit-scrollbar{display:none;}
  .day-tab-btn{font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:12px 22px;border:none;border-bottom:3px solid transparent;margin-bottom:-1px;cursor:pointer;background:transparent;color:var(--text-muted);white-space:nowrap;transition:all 0.15s;}
  .day-tab-btn:hover{color:var(--navy);}
  .day-tab-btn.active{color:var(--navy);border-bottom-color:var(--teal);font-weight:800;}
  .grid-head{display:grid;gap:0;border-bottom:1px solid var(--border);background:var(--navy);}
  .ghc{padding:10px 14px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.8);border-right:1px solid rgba(255,255,255,0.1);}
  .ghc:last-child{border-right:none;}
  .grid-body{display:flex;flex-direction:column;}
  .time-row{display:grid;gap:0;border-bottom:1px solid var(--gray);min-height:46px;}
  .time-row:last-child{border-bottom:none;}
  .time-cell{padding:10px 10px 6px 14px;font-size:11px;font-family:'Inter',monospace;color:var(--text-light);border-right:1px solid var(--gray);background:var(--offwhite);}
  .session-cell{border-right:1px solid var(--gray);padding:4px;}
  .session-cell:last-child{border-right:none;}
  .session-inner{width:100%;height:100%;border-radius:var(--radius);padding:7px 10px;min-height:36px;display:flex;flex-direction:column;justify-content:center;position:relative;}
  .s-title{font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px;}
  .s-speaker{font-size:11px;color:var(--text-muted);}
  .type-empty{background:var(--offwhite);border:1px dashed var(--border);}
  .type-empty .s-title{color:var(--text-light);font-weight:400;font-style:italic;}
  .type-single{background:linear-gradient(135deg,#E8F0FE 0%,#D2E3FC 100%);border:1px solid #A8C7FA;}
  .type-social{background:linear-gradient(135deg,#FCE8F3 0%,#F8BBD0 100%);border:1px solid #F48FB1;}
  .type-break{background:linear-gradient(135deg,#FFF4E6 0%,#FFE0B2 100%);border:1px solid #FFB74D;}
  .type-roomE{background:linear-gradient(135deg,#E8F5E9 0%,#C8E6C9 100%);border:1px solid #81C784;}
  .type-roomW{background:linear-gradient(135deg,#E1F5FE 0%,#B3E5FC 100%);border:1px solid #4FC3F7;}
  .type-roomW1{background:linear-gradient(135deg,#FFF9C4 0%,#FFF59D 100%);border:1px solid #FFF176;}
  .type-roomW2{background:linear-gradient(135deg,#FFE0B2 0%,#FFCC80 100%);border:1px solid #FFB74D;}
  .evening-divider{grid-column:1/-1;padding:12px 16px;background:var(--navy);color:var(--white);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;display:flex;align-items:center;gap:12px;}
  .evening-divider-line{flex:1;height:2px;background:var(--teal);}

  @media(max-width:720px){
    .logo-bar{padding:12px 20px;}
  }
  @media print{
    .sticky-nav,.week-selector{display:none!important;}
    .agenda-wrap{border:1px solid #ccc;}
  }
</style>
</head>
<body>

<div class="logo-bar">
  <svg width="200" height="32" viewBox="0 0 200 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <text x="0" y="24" font-family="Barlow" font-weight="800" font-size="20" fill="#2D2B8F">InterSystems</text>
  </svg>
</div>

<div class="hero">
  <div class="hero-eyebrow">Annual Training Event</div>
  <h1 class="hero-title">Support Summit 2026</h1>
  <div class="hero-tagline">Elevate Your Expertise</div>
  <div class="hero-dates">
    <div class="hero-date-pill"><span>Week 1:</span> July 14–17, 2026</div>
    <div class="hero-date-pill"><span>Week 2:</span> July 21–24, 2026</div>
  </div>
</div>

<nav class="sticky-nav">
  <ul>
    <li><a href="#agenda">Agenda</a></li>
  </ul>
</nav>

<section class="section" id="agenda">
  <div class="section-inner">
    <h2 class="section-title">Training Agenda</h2>

    <div class="week-selector" id="weekSelector">
      <button class="week-btn active" onclick="switchWeek(1)">Week 1</button>
      <button class="week-btn" onclick="switchWeek(2)">Week 2</button>
    </div>

    <div class="agenda-wrap">
      <div class="day-tabs-row" id="dayTabs"></div>
      <div class="grid-head" id="gridHead"></div>
      <div class="grid-body" id="gridBody"></div>
    </div>
  </div>
</section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDq5HSFeS62FpKswWu2L6R9Ie7M22_rrwU",
    authDomain: "support-summit-agenda.firebaseapp.com",
    databaseURL: "https://support-summit-agenda-default-rtdb.firebaseio.com",
    projectId: "support-summit-agenda",
    storageBucket: "support-summit-agenda.firebasestorage.app",
    messagingSenderId: "78793993572",
    appId: "1:78793993572:web:74e9ad579c99cc7b9c9e71"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const DAYS = ['Monday','Tuesday','Wednesday','Thursday'];
  const DAYTIME = ['8:00 AM','8:30 AM','9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM','4:00 PM','4:30 PM','5:00 PM'];
  const EVENING = ['5:30 PM','6:00 PM','6:30 PM','7:00 PM','7:30 PM','8:00 PM','8:30 PM','9:00 PM'];
  const HAS_EVENING = new Set(['Tuesday']);
  function allSlots(day){return HAS_EVENING.has(day)?[...DAYTIME,...EVENING]:DAYTIME;}

  let slotMode={}, sessions={};
  let currentDay=0, currentWeek=1;

  function fbPath(w){return `agenda_week${w}`;}

  function buildDefaultSlotMode(){
    const sm={};
    DAYS.forEach(day=>{sm[day]={};allSlots(day).forEach(s=>{sm[day][s]='single';});});
    return sm;
  }

  async function initFirebase(){
    const snap = await get(ref(db,fbPath(currentWeek)));
    const d = snap.val();
    if(d && d.slotMode){
      slotMode=d.slotMode;
      sessions=d.sessions||{};
    } else {
      slotMode=buildDefaultSlotMode();
      sessions={};
    }
    onValue(ref(db,fbPath(currentWeek)),snap=>{
      const d=snap.val();
      if(d && d.slotMode){
        slotMode=d.slotMode;
        sessions=d.sessions||{};
        renderGrid();
      }
    });
    renderTabs();
    renderGrid();
  }

  window.switchWeek=async (w)=>{
    currentWeek=w;
    document.querySelectorAll('.week-btn').forEach((b,i)=>b.classList.toggle('active',i+1===w));
    const snap=await get(ref(db,fbPath(w)));
    const d=snap.val();
    if(d && d.slotMode){
      slotMode=d.slotMode;
      sessions=d.sessions||{};
    } else {
      slotMode=buildDefaultSlotMode();
      sessions={};
    }
    renderTabs();
    renderGrid();
  };

  window.switchDay=(i)=>{currentDay=i;renderTabs();renderGrid();};

  function renderTabs(){
    document.getElementById('dayTabs').innerHTML=DAYS.map((d,i)=>
      `<button class="day-tab-btn ${i===currentDay?'active':''}" onclick="switchDay(${i})">${d}</button>`
    ).join('');
  }

  function colsForMode(m){
    if(m==='two')return '72px 1fr 1fr';
    if(m==='three')return '72px 1fr 1fr 1fr';
    return '72px 1fr';
  }

  function getMode(day,slot){return slotMode[day]?.[slot]||'single';}

  function dominantMode(day){
    const slots=allSlots(day);
    const modes=slots.map(s=>getMode(day,s));
    const counts={};
    modes.forEach(m=>counts[m]=(counts[m]||0)+1);
    return Object.keys(counts).reduce((a,b)=>counts[a]>counts[b]?a:b,'single');
  }

  function renderGrid(){
    const day=DAYS[currentDay],slots=allSlots(day),dom=dominantMode(day);
    const headEl=document.getElementById('gridHead');
    headEl.style.gridTemplateColumns=colsForMode(dom);
    let hh=`<div class="ghc">Time</div>`;
    if(dom==='single')hh+=`<div class="ghc">Session</div>`;
    else if(dom==='two')hh+=`<div class="ghc">East Tower</div><div class="ghc">West Tower</div>`;
    else hh+=`<div class="ghc">East Tower</div><div class="ghc">West Tower 1</div><div class="ghc">West Tower 2</div>`;
    headEl.innerHTML=hh;

    let html='';let pe=false;
    slots.forEach(slot=>{
      if(EVENING.includes(slot)&&!pe){
        pe=true;
        html+=`<div class="time-row" style="grid-template-columns:${colsForMode(dom)};min-height:auto;border-bottom:1px solid var(--gray);">
          <div class="evening-divider"><span>Evening</span><div class="evening-divider-line"></div></div>
        </div>`;
      }
      const mode=getMode(day,slot);
      html+=`<div class="time-row" style="grid-template-columns:${colsForMode(mode)}">`;
      html+=`<div class="time-cell">${slot}</div>`;
      if(mode==='single'){
        const k=`${day}||${slot}||single`;
        const s=sessions[k]||{type:'empty',title:'',speaker:'',notes:''};
        const span=dom==='three'?4:dom==='two'?3:2;
        html+=`<div class="session-cell" style="grid-column:2/${span}">
          <div class="session-inner type-${s.type||'empty'}">
            <div class="s-title">${s.title||'—'}</div>
            ${s.speaker?`<div class="s-speaker">${s.speaker}</div>`:''}
          </div>
        </div>`;
      } else if(mode==='two'){
        ['roomE','roomW'].forEach(r=>{
          const k=`${day}||${slot}||${r}`;
          const s=sessions[k]||{type:r,title:'',speaker:'',notes:''};
          html+=`<div class="session-cell"><div class="session-inner type-${s.type||r}">
            <div class="s-title">${s.title||'—'}</div>
            ${s.speaker?`<div class="s-speaker">${s.speaker}</div>`:''}
          </div></div>`;
        });
      } else {
        ['roomE','roomW1','roomW2'].forEach(r=>{
          const k=`${day}||${slot}||${r}`;
          const s=sessions[k]||{type:r,title:'',speaker:'',notes:''};
          html+=`<div class="session-cell"><div class="session-inner type-${s.type||r}">
            <div class="s-title">${s.title||'—'}</div>
            ${s.speaker?`<div class="s-speaker">${s.speaker}</div>`:''}
          </div></div>`;
        });
      }
      html+=`</div>`;
    });
    document.getElementById('gridBody').innerHTML=html;
  }

  // Smooth scroll for nav links
  document.querySelectorAll('.sticky-nav a').forEach(a=>{
    a.addEventListener('click',e=>{
      if(a.getAttribute('href').startsWith('#')){
        e.preventDefault();
        const el=document.querySelector(a.getAttribute('href'));
        if(el)el.scrollIntoView({behavior:'smooth'});
      }
    });
  });

  // Active nav on scroll
  const sections=document.querySelectorAll('section[id]');
  window.addEventListener('scroll',()=>{
    let cur='';
    sections.forEach(s=>{if(window.scrollY>=s.offsetTop-100)cur=s.getAttribute('id');});
    document.querySelectorAll('.sticky-nav a').forEach(a=>{
      a.classList.toggle('active',a.getAttribute('href')==='#'+cur);
    });
  });

  initFirebase();
</script>

</body>
</html>
